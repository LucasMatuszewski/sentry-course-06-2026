# Root compose for the PolicyLab training stack.
#
# Two services on an internal Docker network:
#   web — nginx serves the Angular bundle and reverse-proxies /api/ to api:8080
#   api — Spring Boot on port 8080, only reachable via the proxy
#
# Sentry DSNs are PUBLIC ingestion endpoints (per Sentry docs) and are
# hard-coded below so there is zero env-interpolation magic between
# Coolify and the container. Auth tokens (which ARE secret) live only
# in GitHub Actions and never touch this file.

services:
  api:
    image: ghcr.io/lucasmatuszewski/sentry-course-06-2026-api:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      SENTRY_DSN: "https://bf24f04f280201f59caae185d83a97eb@o4511643784511488.ingest.de.sentry.io/4511644672983120"
      SENTRY_ENVIRONMENT: "training"
      SENTRY_RELEASE: "api-spring@main"
      SENTRY_TRACES_SAMPLE_RATE: "1.0"
      SENTRY_PROFILE_SESSION_SAMPLE_RATE: "1.0"
      SENTRY_DEBUG: "true"
      DEMO_SCENARIOS_ENABLED: "true"
      PARTICIPANT_ALIAS: "training-shared"
      SPRING_PROFILES_ACTIVE: "training"
      # Trainer can override any of the above via Coolify env vars; entries
      # in Coolify take precedence over these defaults thanks to how
      # docker-compose --env-file merges values into the container.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 90s

  web:
    image: ghcr.io/lucasmatuszewski/sentry-course-06-2026-web:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 15s
