server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Container-local healthcheck. Coolify hits /actuator/health on the API for the
  # real readiness probe; this is just for the nginx container itself.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Same-origin reverse proxy to the Spring API service inside the compose
  # network. Trace propagation (sentry-trace, baggage, traceparent) is preserved
  # via the default proxy_pass_request_headers behaviour.
  location /api/ {
    proxy_pass http://api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # Angular client-side routing — fall back to index.html for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static asset caching for hashed Angular bundles.
  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  # Belt-and-braces: never serve source maps in production. The Dockerfile
  # deletes them; this returns 404 even if one slipped through.
  location ~* \.map$ { return 404; }
}
