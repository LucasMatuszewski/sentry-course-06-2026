spring.application.name=policylab-api-spring

demo.scenarios.enabled=${DEMO_SCENARIOS_ENABLED:false}
participant.alias=${PARTICIPANT_ALIAS:anonymous}

sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:training}
sentry.release=${SENTRY_RELEASE:}
sentry.sample-rate=${SENTRY_SAMPLE_RATE:1.0}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:1.0}
sentry.profile-session-sample-rate=${SENTRY_PROFILE_SESSION_SAMPLE_RATE:0.0}
sentry.send-default-pii=false
sentry.max-request-body-size=none
sentry.logs.enabled=true
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info
sentry.in-app-includes=com.policylab

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
