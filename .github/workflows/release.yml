name: Release

# Runs on push to main and on manual dispatch. Builds the Angular and Spring
# images, pushes them to GHCR, uploads source maps / source context to Sentry,
# creates Sentry releases, and (optionally) triggers Coolify to redeploy.
#
# Secrets / variables this workflow consumes (all set on the `training`
# environment, never on the repository root):
#   SENTRY_AUTH_TOKEN     - org-owned internal integration token, scope: org:ci
#   COOLIFY_WEBHOOK_URL   - the per-application redeploy webhook from Coolify
#   COOLIFY_API_TOKEN     - optional, only if you choose authenticated trigger
#
# Required permissions:
#   contents: read           - checkout
#   packages: write          - push to GHCR
#   id-token: write          - allow getsentry/action-release OIDC if used

on:
  push:
    branches: [main]
    # Doc / slide / config changes do not warrant a 10+ min multi-arch
    # rebuild. To force a release after a doc-only change, use
    # `gh workflow run release.yml --ref main`.
    paths-ignore:
      - "course-materials/**"
      - "docs/**"
      - "**/*.md"
      - "**/*.MD"
      - "**/UPSTREAM.md"
      - "**/CODE_REVIEW.md"
      - ".gitignore"
      - ".gitattributes"
      - "mise.toml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "LICENSE.*"
      - ".env.example"
      - "scripts/**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Trigger Coolify redeploy after build?"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SENTRY_ORG: devpowers
  REGISTRY: ghcr.io
  IMAGE_OWNER: lucasmatuszewski
  REPO_SLUG: sentry-course-06-2026

jobs:
  meta:
    name: Compute release names
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.v.outputs.sha }}
      angular_release: ${{ steps.v.outputs.angular_release }}
      spring_release: ${{ steps.v.outputs.spring_release }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          {
            echo "sha=$SHA"
            echo "angular_release=angular@$SHA"
            echo "spring_release=api-spring@$SHA"
          } >> "$GITHUB_OUTPUT"

  angular-image:
    name: Angular — build, source maps, push image
    needs: meta
    runs-on: ubuntu-latest
    environment: training
    defaults:
      run:
        working-directory: apps/angular
    env:
      SENTRY_PROJECT: javascript-angular
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_RELEASE: ${{ needs.meta.outputs.angular_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Production build with source maps
        run: pnpm exec ng build --configuration production --source-map
      - name: Create Sentry release + upload source maps
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          environment: training
          version: ${{ env.SENTRY_RELEASE }}
          sourcemaps: apps/angular/dist
          projects: ${{ env.SENTRY_PROJECT }}
          ignore_missing: true
          ignore_empty: true
      - name: Note when Sentry release was skipped
        if: env.SENTRY_AUTH_TOKEN == ''
        run: echo "::warning::SENTRY_AUTH_TOKEN not set on training environment; skipped Sentry release. Set it at github.com/LucasMatuszewski/sentry-course-06-2026/settings/environments/training/edit"
      - name: Strip .map files before image build
        run: find dist -name '*.map' -delete
      # QEMU enables linux/arm64 cross-build for ARM hosts (Hetzner Ampere
      # VPS that hosts Coolify in this workshop). amd64 still builds
      # natively. https://docs.docker.com/build/building/multi-platform/
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push web image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: apps/angular
          file: apps/angular/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SENTRY_RELEASE=${{ env.SENTRY_RELEASE }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_SLUG }}-web:${{ needs.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_SLUG }}-web:main

      - name: Report failure to Sentry
        if: failure()
        uses: ./.github/actions/sentry-report-failure
        with:
          dsn: ${{ vars.WEB_SENTRY_DSN }}
          message: "Angular release failed (${{ github.job }}) ${{ env.SENTRY_RELEASE }}"
          environment: release
          release: ${{ env.SENTRY_RELEASE }}
          extra_tags: "stage:release platform:angular"

  spring-image:
    name: Spring — build, source context, push image
    needs: meta
    runs-on: ubuntu-latest
    environment: training
    env:
      SENTRY_PROJECT: java-spring-boot
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_RELEASE: ${{ needs.meta.outputs.spring_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build bootJar (Sentry Gradle plugin uploads source bundle if token set)
        working-directory: apps/api-spring
        run: ./gradlew bootJar --no-daemon -x test -Dsentry.release=${{ env.SENTRY_RELEASE }}
      - name: Create Sentry release (Spring)
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          environment: training
          version: ${{ env.SENTRY_RELEASE }}
          projects: ${{ env.SENTRY_PROJECT }}
          ignore_missing: true
          ignore_empty: true
      - name: Note when Sentry release was skipped (Spring)
        if: env.SENTRY_AUTH_TOKEN == ''
        run: echo "::warning::SENTRY_AUTH_TOKEN not set; skipped Spring release."
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push api image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: apps/api-spring
          file: apps/api-spring/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_SLUG }}-api:${{ needs.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.REPO_SLUG }}-api:main

      - name: Report failure to Sentry
        if: failure()
        uses: ./.github/actions/sentry-report-failure
        with:
          dsn: ${{ vars.API_SENTRY_DSN }}
          message: "Spring release failed (${{ github.job }}) ${{ env.SENTRY_RELEASE }}"
          environment: release
          release: ${{ env.SENTRY_RELEASE }}
          extra_tags: "stage:release platform:spring"

  deploy:
    name: Trigger Coolify redeploy
    needs: [meta, angular-image, spring-image]
    runs-on: ubuntu-latest
    environment: training
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    steps:
      - name: Ping Coolify webhook
        env:
          WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::COOLIFY_WEBHOOK_URL not set; skipping deploy."
            exit 0
          fi
          # Coolify "Deploy Webhook (auth required)" needs a Bearer API
          # token. Without it the endpoint 403s. The token is a Coolify
          # API token created in Coolify -> Profile -> Keys & Tokens, NOT
          # a Sentry token. Both lives in the training env secret store.
          AUTH=()
          if [ -n "$TOKEN" ]; then
            AUTH=(-H "Authorization: Bearer ${TOKEN}")
          fi
          curl --fail-with-body -X POST "$WEBHOOK" \
            "${AUTH[@]}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\":\"${{ needs.meta.outputs.sha }}\"}"
      - name: Wait for deployment health
        id: health
        env:
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: |
          if [ -z "$PUBLIC_URL" ]; then
            echo "PUBLIC_URL variable not set; skipping health probe."
            exit 0
          fi
          for i in $(seq 1 30); do
            sleep 10
            if curl -sf "$PUBLIC_URL/healthz" > /dev/null; then
              echo "Healthy after $((i*10))s."
              echo "elapsed_s=$((i*10))" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Not yet healthy (attempt $i/30)..."
          done
          echo "::error::Health probe never succeeded after 5 min."
          exit 1

      - name: Report failure to Sentry
        if: failure()
        uses: ./.github/actions/sentry-report-failure
        with:
          dsn: ${{ vars.API_SENTRY_DSN }}
          message: "Deploy failed on Coolify for ${{ needs.meta.outputs.sha }}"
          environment: deploy
          release: api-spring@${{ needs.meta.outputs.sha }}
          extra_tags: "stage:deploy host:coolify"
