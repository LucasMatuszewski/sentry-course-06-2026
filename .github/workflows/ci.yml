name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# PR-safe by design: no Sentry secrets touched in this workflow.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      angular: ${{ steps.filter.outputs.angular }}
      spring: ${{ steps.filter.outputs.spring }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            angular:
              - 'apps/angular/**'
              - '.github/workflows/ci.yml'
            spring:
              - 'apps/api-spring/**'
              - '.github/workflows/ci.yml'
            android:
              - 'apps/android/**'
              - '.github/workflows/ci.yml'

  angular:
    name: Angular — lint, test, build
    needs: changes
    if: needs.changes.outputs.angular == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Unit tests (headless)
        run: pnpm exec ng test --watch=false --browsers=ChromeHeadless
      - name: Production build (with source maps for upload)
        run: pnpm exec ng build --configuration production --source-map
      - name: Upload Angular dist as PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist-${{ github.sha }}
          path: apps/angular/dist
          if-no-files-found: error
          retention-days: 7

      - name: Report failure to Sentry
        if: failure()
        uses: ./.github/actions/sentry-report-failure
        with:
          dsn: ${{ vars.WEB_SENTRY_DSN }}
          message: "Angular CI failed (${{ github.job }}) on ${{ github.ref_name }}"
          environment: ci
          release: angular@${{ github.sha }}
          extra_tags: "stage:ci platform:angular"

  spring:
    name: Spring Boot — test, build
    needs: changes
    if: needs.changes.outputs.spring == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-spring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Gradle tests (unit + integration)
        run: ./gradlew test --no-daemon
      # Source context upload requires SENTRY_AUTH_TOKEN; left off on PRs intentionally.
      - name: Gradle bootJar (without source context)
        env:
          SENTRY_AUTH_TOKEN: ""
        run: ./gradlew bootJar --no-daemon -x test
      - name: Upload Spring jar as PR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-spring-jar-${{ github.sha }}
          path: apps/api-spring/build/libs/*.jar
          if-no-files-found: error
          retention-days: 7

      - name: Report failure to Sentry
        if: failure()
        uses: ./.github/actions/sentry-report-failure
        with:
          dsn: ${{ vars.API_SENTRY_DSN }}
          message: "Spring CI failed (${{ github.job }}) on ${{ github.ref_name }}"
          environment: ci
          release: api-spring@${{ github.sha }}
          extra_tags: "stage:ci platform:spring"

  android:
    # The AI Studio snapshot does not ship a Gradle wrapper. The on-device demo
    # path is Android Studio (which provides its own gradle), so CI just sanity-
    # checks that the manifest and build script parse. assembleDebug is left for
    # a follow-up once `gradle wrapper` has been committed.
    name: Android — manifest & build script sanity
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - name: Confirm key files are present and parseable
        shell: bash
        run: |
          set -eu
          test -f app/src/main/AndroidManifest.xml
          test -f build.gradle.kts
          test -f app/build.gradle.kts
          # Manifest must be valid XML.
          python3 -c "import xml.etree.ElementTree as E; E.parse('app/src/main/AndroidManifest.xml')"
          echo "Android sources look structurally intact."

      - name: Report failure to Sentry
        if: failure()
        uses: ./.github/actions/sentry-report-failure
        with:
          dsn: ${{ vars.ANDROID_SENTRY_DSN }}
          message: "Android CI failed (${{ github.job }}) on ${{ github.ref_name }}"
          environment: ci
          extra_tags: "stage:ci platform:android"
